<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ridekaro</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family:sans-serif; }
    header { background:#111; color:white; padding:15px; text-align:center; }
    #map { height:300px; width:100%; }
    input, button, select {
      width:100%; padding:10px; margin:8px 0;
    }
    button { background:red; color:white; border:none; }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="logo.png" width="120"><br>
  <h2>Ridekaro</h2>
</header>

<!-- LOGIN -->
<div style="padding:20px;">
  <h3>Login / Signup</h3>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- MAP + BOOK -->
<div style="padding:20px;">
  <h3>Book Ride</h3>

  <div id="map"></div>

  <input id="pickup" placeholder="Pickup">
  <input id="drop" placeholder="Drop">

  <select id="rideType">
    <option>Bike Taxi</option>
    <option>Parcel</option>
  </select>

  <button onclick="bookRide()">Confirm Booking</button>

  <p id="fare">Estimated Fare: ₹0</p>
</div>

<!-- RIDES -->
<div id="ridesList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// VARIABLES
let pickupLat=null, pickupLng=null, dropLat=null, dropLng=null;

// DISTANCE
function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// FARE
function calculateFare(){
  if(!pickupLat||!dropLat) return;
  let fare=30+(getDistance(pickupLat,pickupLng,dropLat,dropLng)*10);
  document.getElementById("fare").innerText="Estimated Fare: ₹"+Math.round(fare);
}

// MAP
window.addEventListener("load",()=>{
  var map=L.map('map');
  let dropMarker=null;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  navigator.geolocation.getCurrentPosition(pos=>{
    pickupLat=pos.coords.latitude;
    pickupLng=pos.coords.longitude;

    map.setView([pickupLat,pickupLng],15);

    L.marker([pickupLat,pickupLng]).addTo(map)
      .bindPopup("You are here").openPopup();
  });

  map.on('click',e=>{
    dropLat=e.latlng.lat;
    dropLng=e.latlng.lng;

    if(dropMarker) map.removeLayer(dropMarker);

    dropMarker=L.marker([dropLat,dropLng]).addTo(map);

    calculateFare();
  });
});

// AUTH
window.signup=async()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("Signup success");
};

window.login=async()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
  alert("Login success");
};

// BOOK
window.bookRide=async()=>{
  if(!auth.currentUser) return alert("Login first");

  await addDoc(collection(db,"rides"),{
    pickup,drop,rideType,user:auth.currentUser.email
  });

  alert("Booked!");
};
</script>

</body>
</html>
