<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ridekaro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin:0; text-align:center; }
#map { height: 400px; width:100%; margin-top:20px; }
input, button { padding:10px; margin:5px; width:90%; max-width:400px; }
</style>
</head>

<body>

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<h2>Book Ride</h2>

<div id="map"></div>

<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">

<button onclick="bookRide()">Book Ride</button>

<p id="fare">Estimated Fare: ₹0</p>

<h2>My Rides</h2>
<div id="ridesList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

// 🔥 Firebase Config (your real one)
const firebaseConfig = {
  apiKey: "AIzaSyDq8djWCKZCx9a0evT8n85vYZt8srcxH8o",
  authDomain: "ridekaro-2237b.firebaseapp.com",
  projectId: "ridekaro-2237b",
  storageBucket: "ridekaro-2237b.firebasestorage.app",
  messagingSenderId: "805660027682",
  appId: "1:805660027682:web:0117b81f4ec8d341e5d37b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 Auth state
onAuthStateChanged(auth, (user) => {
  console.log(user ? "Logged in" : "Not logged in");
});

// 🔐 Signup
window.signup = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Signup successful");
  } catch (e) {
    alert(e.message);
  }
};

// 🔐 Login
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login successful");
    loadRides();
  } catch (e) {
    alert(e.message);
  }
};

// 🚗 Book Ride (FIXED VALIDATION)
window.bookRide = async () => {
  if (!auth.currentUser) return alert("Login first");

  if (!pickupLat || !dropLat) {
    alert("Please select pickup and drop on map");
    return;
  }

  try {
    await addDoc(collection(db, "rides"), {
      pickup: document.getElementById("pickup").value,
      drop: document.getElementById("drop").value,
      user: auth.currentUser.email,
      time: new Date()
    });

    alert("Ride booked");
    loadRides();
  } catch (e) {
    alert(e.message);
  }
};

// 📄 Load rides
async function loadRides() {
  const q = query(collection(db, "rides"), where("user","==",auth.currentUser.email));
  const snap = await getDocs(q);

  let html = "";
  snap.forEach(doc=>{
    const d = doc.data();
    html += <p>${d.pickup} → ${d.drop}</p>;
  });

  document.getElementById("ridesList").innerHTML = html;
}

// 🌍 MAP VARIABLES
let map;
let pickupLat=null, pickupLng=null, dropLat=null, dropLng=null;
let pickupMarker, dropMarker;

// 📏 Distance function
function getDistance(lat1, lon1, lat2, lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)Math.cos(lat2*Math.PI/180)
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// 💰 Fare calculation
window.calculateFare = ()=>{
  if(pickupLat==null||dropLat==null) return;
  let d = getDistance(pickupLat,pickupLng,dropLat,dropLng);
  document.getElementById("fare").innerText =
    "Estimated Fare: ₹" + Math.round(30 + d*10);
};

// 🚀 Init Map
window.addEventListener("DOMContentLoaded", ()=>{

  map = L.map('map').setView([20.5937,78.9629],5);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  // 📍 CURRENT LOCATION (FIXED ERROR HANDLING)
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat=pos.coords.latitude;
        const lng=pos.coords.longitude;

        map.setView([lat,lng],14);

        L.marker([lat,lng]).addTo(map)
          .bindPopup("📍 You are here");

        pickupLat=lat;
        pickupLng=lng;

        document.getElementById("pickup").value="Current Location";
      },
      err => {
        alert("Location not allowed. Select pickup manually.");
      }
    );
  }

  // 📌 Click logic
  map.on("click", e=>{
    let lat=e.latlng.lat, lng=e.latlng.lng;

    // Pickup
    if(pickupLat==null){
      pickupLat=lat; pickupLng=lng;

      if(pickupMarker) map.removeLayer(pickupMarker);
      pickupMarker=L.marker([lat,lng]).addTo(map)
        .bindPopup("📍 Pickup");

      document.getElementById("pickup").value=lat+","+lng;
    }

    // Drop
    else if(dropLat==null){
      dropLat=lat; dropLng=lng;

      if(dropMarker) map.removeLayer(dropMarker);
      dropMarker=L.marker([lat,lng]).addTo(map)
        .bindPopup("📍 Drop");

      document.getElementById("drop").value=lat+","+lng;

      calculateFare();
    }

    // Reset
    else{
      pickupLat=lat; pickupLng=lng;
      dropLat=null; dropLng=null;

      map.eachLayer(l=>{
        if(l instanceof L.Marker) map.removeLayer(l);
      });

      pickupMarker=L.marker([lat,lng]).addTo(map)
        .bindPopup("📍 Pickup");

      document.getElementById("pickup").value=lat+","+lng;
      document.getElementById("drop").value="";
      document.getElementById("fare").innerText="Estimated Fare: ₹0";
    }
  });

});

</script>
</body>
</html>
