<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<title>Ridekaro</title>
<link rel="icon" href="logo.png">

<style>
body{font-family:sans-serif;margin:0;background:#fff;}
.header{background:#f4c430;text-align:center;padding:15px;}
.header img{height:60px;display:block;margin:auto;}
.header h2{margin:5px;}
.container{padding:20px;}
input,button,select{padding:12px;margin:5px 0;width:100%;font-size:16px;}
button{background:#f4c430;border:none;cursor:pointer;}
#map{height:300px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<h2>Ridekaro</h2>

<a href="https://wa.me/917051768470">
<button style="background:green;color:white;width:200px">
Book on WhatsApp
</button>
</a>
</div>

<div class="container">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div class="container">
<h3>Book Ride</h3>
<div id="map"></div>
<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">

<select id="rideType">
<option>Bike Taxi</option>
<option>Parcel Delivery</option>
<option>Local Ride</option>
</select>

<button onclick="bookRide()">Confirm Booking</button>
<p id="fare">Estimated Fare: ₹0</p>
</div>

<div class="container">
<div id="ridesList"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- ✅ ADDED: EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDq8djWCKZCx9a0evT8n85vYZt8srcxH8o",
authDomain: "ridekaro-2237b.firebaseapp.com",
projectId: "ridekaro-2237b",
storageBucket: "ridekaro-2237b.firebasestorage.app",
messagingSenderId: "805660027682",
appId: "1:805660027682:web:0117b81f4ec8d341e5d37b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let pickupLat,pickupLng,dropLat,dropLng;

const map = L.map('map').setView([28.6139,77.2090], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

navigator.geolocation.getCurrentPosition(pos=>{
pickupLat=pos.coords.latitude;
pickupLng=pos.coords.longitude;
map.setView([pickupLat,pickupLng],15);
L.marker([pickupLat,pickupLng]).addTo(map);
});

map.on('click',e=>{
dropLat=e.latlng.lat;
dropLng=e.latlng.lng;
L.marker([dropLat,dropLng]).addTo(map);
calculateFare();
});

function getDistance(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;

const x=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function calculateFare(){
if(!pickupLat || !dropLat) return;

let fare = 30 + getDistance(
pickupLat,
pickupLng,
dropLat,
dropLng
)*10;

document.getElementById("fare").innerHTML =
"Estimated Fare: ₹"+Math.round(fare);
}

function signup(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Signup success"))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
alert("Login success");
loadRides();
})
.catch(e=>alert(e.message));
}

function bookRide(){

if(!auth.currentUser){
alert("Login first");
return;
}

db.collection("rides").add({
pickup:pickup.value,
drop:drop.value,
user:auth.currentUser.email,
fare:document.getElementById("fare").innerText,
time:new Date()
})
.then(()=>{
alert("Ride Booked");

<!-- ✅ ADDED EMAIL CALL -->
sendEmail({
pickup:pickup.value,
drop:drop.value,
user:auth.currentUser.email,
fare:document.getElementById("fare").innerText
});

loadRides();
});

}

<!-- ✅ ADDED EMAIL FUNCTION -->
function sendEmail(data){
emailjs.send("service_a20rsus","template_xot7epe",{
user: data.user,
pickup: data.pickup,
drop: data.drop,
fare: data.fare
})
.then(()=>console.log("Email sent"))
.catch(e=>console.log(e));
}

<!-- ✅ ADDED INIT -->
(function(){
emailjs.init("szp9VSLWIoqh_DW6P");
})();

function loadRides(){

db.collection("rides")
.where("user","==",auth.currentUser.email)
.get()
.then(snap=>{

let html="";

snap.forEach(doc=>{
let d=doc.data();

html += `<div>
🚗 ${d.pickup} → ${d.drop} <br>
💰 ${d.fare}
</div><hr>`;
});

ridesList.innerHTML = html;

});

}

</script>

</body>
</html>
