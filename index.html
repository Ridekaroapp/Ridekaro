<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<title>Ridekaro</title>
<link rel="icon" href="logo.png">

<style>
body{font-family:sans-serif;margin:0}
#map{height:300px}
input,button,select{padding:8px;margin:5px}
</style>
</head>

<body>

<div style="text-align:center;padding:10px">
<img src="logo.png" height="60">
<h2>Ridekaro</h2>
</div>

<div style="text-align:center">
<a href="https://wa.me/917051768470">
<button style="background:green;color:white">Book on WhatsApp</button>
</a>
</div>

<div style="padding:20px">
<h3>Login / Signup</h3>

<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="password"><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div style="padding:20px">
<h3>Book Ride</h3>

<div id="map"></div>

<input id="pickup" placeholder="pickup"><br>
<input id="drop" placeholder="drop"><br>

<select id="rideType">
<option>Bike Taxi</option>
<option>Parcel</option>
<option>Local Ride</option>
</select><br>

<button onclick="bookRide()">Confirm</button>

<p id="fare">₹0</p>
</div>

<div id="ridesList"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDq8djWCKZCx9a0evT8n85vYZt8srcxH8o",
authDomain: "ridekaro-2237b.firebaseapp.com",
projectId: "ridekaro-2237b",
storageBucket: "ridekaro-2237b.firebasestorage.app",
messagingSenderId: "805660027682",
appId: "1:805660027682:web:0117b81f4ec8d341e5d37b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let pickupLat, pickupLng, dropLat, dropLng;

const map = L.map('map').setView([28.6139,77.2090], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

navigator.geolocation.getCurrentPosition(pos=>{
pickupLat=pos.coords.latitude;
pickupLng=pos.coords.longitude;

map.setView([pickupLat,pickupLng],15);

L.marker([pickupLat,pickupLng]).addTo(map);
});

map.on('click',e=>{
dropLat=e.latlng.lat;
dropLng=e.latlng.lng;

L.marker([dropLat,dropLng]).addTo(map);
});

function signup(){
auth.createUserWithEmailAndPassword(
email.value,
password.value
).then(()=>alert("Signup success"))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(
email.value,
password.value
).then(()=>{
alert("Login success");
loadRides();
})
.catch(e=>alert(e.message));
}

function bookRide(){
if(!auth.currentUser){
alert("login first");
return;
}

db.collection("rides").add({
pickup:pickup.value,
drop:drop.value,
user:auth.currentUser.email,
time:new Date()
}).then(()=>{
alert("Ride booked");
loadRides();
});
}

function loadRides(){
db.collection("rides")
.where("user","==",auth.currentUser.email)
.get()
.then(snap=>{
let html="";
snap.forEach(doc=>{
let d=doc.data();
html+=<div>${d.pickup} → ${d.drop}</div>;
});
ridesList.innerHTML=html;
});
}
</script>

</body>
</html>
